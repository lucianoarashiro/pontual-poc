<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pontual — Mobile</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f1117;
  --s1:       #181c27;
  --s2:       #1f2433;
  --border:   rgba(255,255,255,.08);
  --accent:   #4f8ef7;
  --accent2:  #7c5cfc;
  --green:    #22c97a;
  --amber:    #f5a623;
  --red:      #f74f4f;
  --text:     #e8eaf0;
  --muted:    #7a8099;
  --sans:     'Inter', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}

body {
  font-family: var(--sans);
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px 16px;
}

/* ── PHONE SHELL ── */
.phone {
  width: 375px;
  height: 720px;
  background: var(--bg);
  border-radius: 40px;
  border: 2px solid rgba(255,255,255,.12);
  overflow: hidden;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
  display: flex;
  flex-direction: column;
}

/* ── STATUS BAR ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px 0;
  flex-shrink: 0;
}
.status-time { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); }
.status-icons { display: flex; gap: 6px; align-items: center; font-size: 13px; color: var(--text); }

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px 8px;
  flex-shrink: 0;
}
.greeting { font-size: 15px; font-weight: 500; color: var(--text); }
.greeting-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff;
}

/* ── SCROLL AREA ── */
.scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.scroll::-webkit-scrollbar { display: none; }

/* ── CARDS ── */
.card {
  background: var(--s1);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  animation: fadeUp .25s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ponto */
.ponto-time { font-size: 28px; font-weight: 500; color: var(--text); font-family: var(--mono); letter-spacing: -1px; }
.ponto-escala { font-size: 11px; color: var(--muted); margin-top: 3px; }
.ponto-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

.ponto-btn {
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity .15s, transform .1s;
}
.ponto-btn:active { opacity: .85; transform: scale(.98); }
.ponto-btn.saida { background: linear-gradient(135deg, #f74f4f, #c23030); }
.ponto-btn.done { background: rgba(34,201,122,.15); color: var(--green); border: 0.5px solid rgba(34,201,122,.3); }

/* banco */
.banco-val { font-size: 22px; font-weight: 500; color: var(--green); font-family: var(--mono); }
.banco-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.bar-track { height: 3px; background: var(--s2); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--green)); width: 103%; }

/* semana */
.week-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 0.5px solid var(--border); font-size: 13px;
}
.week-row:last-child { border-bottom: none; }
.week-row.clickable { cursor: pointer; }
.week-day { font-size: 12px; color: var(--muted); min-width: 70px; }
.week-hrs { font-size: 12px; color: var(--text); font-family: var(--mono); flex: 1; margin-left: 8px; }

.badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
.badge-ok { background: rgba(34,201,122,.15); color: var(--green); }
.badge-today { background: rgba(79,142,247,.15); color: var(--accent); }
.badge-next { background: rgba(255,255,255,.06); color: var(--muted); }
.badge-warn { background: rgba(245,166,35,.15); color: var(--amber); }
.badge-danger { background: rgba(247,79,79,.15); color: var(--red); }

/* section label */
.sec-label { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 6px; }

/* metric grid */
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.metric-card { background: var(--s2); border-radius: 10px; padding: 10px 12px; }
.metric-val { font-size: 18px; font-weight: 500; font-family: var(--mono); color: var(--text); }
.metric-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* banco detalhe */
.bd-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
.bd-row:last-child { border-bottom: none; }
.bd-date { color: var(--muted); min-width: 36px; }
.bd-desc { color: var(--text); flex: 1; }
.bd-val { font-family: var(--mono); }
.bd-credit { color: var(--green); }
.bd-debit { color: var(--red); }
.bd-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
.bd-fc { }
.bd-fc-label { font-size: 10px; color: var(--muted); }
.bd-fc-val { font-size: 13px; font-family: var(--mono); font-weight: 500; margin-top: 2px; }

/* atestado / ajuste */
.form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.form-label { font-size: 11px; color: var(--muted); font-weight: 500; }
.form-val { font-size: 13px; color: var(--text); padding: 8px 10px; background: var(--s2); border-radius: 8px; border: 0.5px solid var(--border); }
.form-select {
  font-size: 13px; color: var(--text); padding: 8px 10px;
  background: var(--s2); border-radius: 8px; border: 0.5px solid var(--border);
  width: 100%; font-family: var(--sans); outline: none;
}

.upload-zone {
  border: 0.5px dashed rgba(255,255,255,.2); border-radius: 10px;
  padding: 18px; text-align: center; cursor: pointer; margin: 10px 0;
  transition: background .15s;
}
.upload-zone:active { background: var(--s2); }
.upload-zone.done { border-color: rgba(34,201,122,.4); background: rgba(34,201,122,.06); }

.action-btn {
  width: 100%; padding: 12px; border-radius: 10px; border: none;
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity .15s;
}
.action-btn:active { opacity: .85; }
.action-btn.success { background: rgba(34,201,122,.15); color: var(--green); border: 0.5px solid rgba(34,201,122,.3); }
.action-btn.info { background: rgba(79,142,247,.15); color: var(--accent); border: 0.5px solid rgba(79,142,247,.3); }
.action-btn.cancel { background: var(--s2); color: var(--muted); margin-top: 6px; }

.enviado-box { background: rgba(34,201,122,.08); border: 0.5px solid rgba(34,201,122,.25); border-radius: 12px; padding: 20px; text-align: center; }
.enviado-icon { font-size: 28px; color: var(--green); }
.enviado-title { font-size: 14px; font-weight: 500; color: var(--green); margin-top: 8px; }
.enviado-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* face scan */
.face-card { background: var(--s1); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
.face-frame {
  width: 160px; height: 160px; border-radius: 50%;
  border: 2px solid var(--accent);
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  background: var(--s2);
  overflow: hidden;
}
.face-frame.scanning { border-color: var(--amber); animation: scanPulse 1s infinite; }
.face-frame.ok { border-color: var(--green); }
@keyframes scanPulse { 0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,.4)} 50%{box-shadow:0 0 0 12px rgba(245,166,35,0)} }
.face-icon { font-size: 72px; color: var(--muted); }
.face-scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
  animation: scanLine 1.5s ease-in-out infinite;
}
@keyframes scanLine { 0%{top:10%} 100%{top:90%} }
.face-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.face-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }
.face-cpf { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
.face-input {
  background: var(--s2); border: 0.5px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 14px;
  text-align: center; outline: none; letter-spacing: 2px; width: 100%;
}
.face-input:focus { border-color: var(--accent); }

/* ── CHAT DRAWER ── */
.chat-drawer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 0.5px solid var(--border);
  border-radius: 20px 20px 0 0;
  display: flex;
  flex-direction: column;
  transform: translateY(calc(100% - 52px));
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  z-index: 10;
  max-height: 85%;
}
.chat-drawer.open { transform: translateY(0); }

.drawer-handle-area {
  padding: 10px 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  flex-shrink: 0;
}
.drawer-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }
.drawer-peek {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0 16px 10px;
}
.drawer-peek-left { display: flex; align-items: center; gap: 8px; }
.bot-dot {
  width: 26px; height: 26px; border-radius: 8px;
  background: rgba(79,142,247,.2);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 13px;
}
.drawer-title { font-size: 13px; font-weight: 500; color: var(--text); }
.drawer-status { font-size: 11px; color: var(--green); }

.chat-msgs {
  flex: 1;
  overflow-y: auto;
  padding: 8px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.chat-msgs::-webkit-scrollbar { display: none; }

.msg { display: flex; flex-direction: column; max-width: 88%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble { padding: 8px 11px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
.msg.bot .msg-bubble { background: var(--s2); border: 0.5px solid var(--border); color: var(--text); border-bottom-left-radius: 3px; }
.msg.user .msg-bubble { background: rgba(79,142,247,.2); color: var(--accent); border-bottom-right-radius: 3px; }
.msg-time { font-size: 10px; color: var(--muted); padding: 2px 3px; }
.msg.user .msg-time { text-align: right; }

.quick-wrap { display: flex; gap: 6px; flex-wrap: wrap; padding: 6px 14px; flex-shrink: 0; }
.quick {
  font-size: 11px; padding: 5px 11px; border-radius: 20px;
  background: var(--s2); border: 0.5px solid var(--border);
  color: var(--text); cursor: pointer; font-family: var(--sans);
  transition: border-color .15s; flex-shrink: 0;
}
.quick:active { border-color: var(--accent); color: var(--accent); }

.chat-input-row {
  padding: 8px 14px 16px;
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
  border-top: 0.5px solid var(--border);
}
.chat-input {
  flex: 1; background: var(--s2); border: 0.5px solid var(--border);
  border-radius: 10px; padding: 8px 12px; font-family: var(--sans);
  font-size: 13px; color: var(--text); resize: none; outline: none; line-height: 1.4;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--muted); }
.send-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: rgba(79,142,247,.2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 14px; flex-shrink: 0;
}

.typing { display: flex; gap: 3px; align-items: center; padding: 2px; }
.typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: tb .8s infinite; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes tb { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-4px)} }
</style>
</head>

<div class="phone">

<script>
let drawerOpen = false;
let pontoBatido = 0;
let entradaTime = '', saidaTime = '';
let currentCtx = 'default';
let uploadDone = false;
let faceState = 'idle'; // idle | scanning | cpf | ok
let atestadoData = { dia: '05/06', diaSemana: 'quarta-feira' };

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('chatDrawer').classList.toggle('open', drawerOpen);
  document.getElementById('drawerIcon').className = drawerOpen
    ? 'ti ti-chevron-down' : 'ti ti-chevron-up';
  document.getElementById('drawerIcon').style.color = 'var(--muted)';
  document.getElementById('drawerIcon').style.fontSize = '14px';
}

function openDrawer() {
  drawerOpen = true;
  document.getElementById('chatDrawer').classList.add('open');
  document.getElementById('drawerIcon').className = 'ti ti-chevron-down';
}

function nowTime() {
  return new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

function pontoSection() {
  const hint = pontoBatido === 0 ? 'Ainda não registrado hoje'
    : pontoBatido === 1 ? `Entrada às <strong>${entradaTime}</strong>`
    : `Saída às <strong>${saidaTime}</strong>`;
  const btnClass = pontoBatido === 0 ? '' : pontoBatido === 1 ? 'saida' : 'done';
  const btnIcon = pontoBatido === 0 ? 'ti-clock' : pontoBatido === 1 ? 'ti-clock-off' : 'ti-check';
  const btnLabel = pontoBatido === 0 ? 'Registrar entrada' : pontoBatido === 1 ? 'Registrar saída' : 'Saída registrada';
  const dis = pontoBatido === 2 ? 'disabled' : '';
  return `
    <div class="card">
      <div class="ponto-time" id="relogio">--:--</div>
      <div class="ponto-escala">Escala hoje: 08:00 – 17:00</div>
      <div class="ponto-hint">${hint}</div>
      <button class="ponto-btn ${btnClass}" onclick="iniciarPonto()" ${dis}>
        <i class="ti ${btnIcon}"></i>${btnLabel}
      </button>
    </div>`;
}

function semanaSection(inconsistente = true) {
  const inconsRow = inconsistente
    ? `<div class="week-row clickable" onclick="irAjuste()">
        <span class="week-day" style="color:var(--amber)">Qua 11/06</span>
        <span class="week-hrs" style="color:var(--amber)">08:02 – ?</span>
        <span class="badge badge-danger">Inconsistente</span>
       </div>`
    : `<div class="week-row">
        <span class="week-day">Qua 11/06</span>
        <span class="week-hrs">08:02–17:00</span>
        <span class="badge badge-ok">Concluído</span>
       </div>`;
  return `
    <div>
      <div class="sec-label">Semana atual</div>
      <div class="card" style="padding:10px 14px">
        <div class="week-row"><span class="week-day">Seg 09/06</span><span class="week-hrs">08:00–17:00</span><span class="badge badge-ok">Concluído</span></div>
        <div class="week-row"><span class="week-day">Ter 10/06</span><span class="week-hrs">08:00–17:00</span><span class="badge badge-ok">Concluído</span></div>
        ${inconsRow}

function renderCtx(ctx) {
  currentCtx = ctx;
  document.getElementById('mainScroll').innerHTML = ctxs[ctx]();
  startClock();
  document.getElementById('mainScroll').scrollTop = 0;
}

function startClock() {
  const el = document.getElementById('relogio');
  if (el) el.textContent = nowTime();
}

// PONTO
function iniciarPonto() {
  faceState = 'idle';
  renderCtx('face');
}

function iniciarScan() {
  faceState = 'scanning';
  renderCtx('face');
  setTimeout(() => {
    faceState = 'cpf';
    renderCtx('face');
  }, 2000);
}

function formatCPF(el) {
  let v = el.value.replace(/\D/g,'');
  if (v.length > 11) v = v.slice(0,11);
  v = v.replace(/(\d{3})(\d)/,'$1.$2')
       .replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3')
       .replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/,'$1.$2.$3-$4');
  el.value = v;
}

function confirmarCPF() {
  const cpf = document.getElementById('cpfInput')?.value || '';
  if (cpf.length < 14) { addBotMsg('CPF inválido. Tente novamente.'); return; }
  faceState = 'ok';
  renderCtx('face');
}

function confirmarPonto() {
  const t = nowTime();
  if (pontoBatido === 0) { entradaTime = t; pontoBatido = 1; }
  else if (pontoBatido === 1) { saidaTime = t; pontoBatido = 2; }
  renderCtx('default');
  const msg = pontoBatido === 1
    ? `Entrada registrada às <strong>${t}</strong>. Bom dia!`
    : `Saída registrada às <strong>${t}</strong>. Até amanhã!`;
  setTimeout(() => { addBotMsg(msg); openDrawer(); }, 300);
}

function irAjuste() {
  renderCtx('ajuste');
  addBotMsg('Abrindo o ajuste da quarta. Selecione o motivo e envie para o gestor.');
  openDrawer();
}

function enviarAjuste() {
  const sel = document.getElementById('motivoSelect');
  if (!sel || !sel.value) { addBotMsg('Selecione um motivo antes de enviar.'); openDrawer(); return; }
  renderCtx('ajuste_ok');
  addBotMsg('Solicitação enviada! Protocolo <strong>#AJ-2025-0318</strong>. Seu gestor aprova em até 1 dia útil.');
  openDrawer();
}

// ATESTADO
function fazerUpload() {
  uploadDone = true;
  const zone = document.getElementById('uploadZone');
  const label = document.getElementById('uploadLabel');
  const btn = document.getElementById('btnEnviar');
  if (!zone) return;
  zone.classList.add('done');
  zone.querySelector('i').className = 'ti ti-circle-check';
  zone.querySelector('i').style.color = 'var(--green)';
  zone.querySelector('i').style.fontSize = '22px';
  if (label) label.textContent = 'atestado_medico.pdf anexado';
  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  addBotMsg('Arquivo recebido! Agora toque em <strong>Enviar para o RH</strong>.');
  openDrawer();
}

function enviarAtestado() {
  uploadDone = false;
  renderCtx('atestado_ok');
  addBotMsg('Atestado enviado! Protocolo <strong>#AB-2025-0412</strong>.');
  openDrawer();
}

// CHAT
function detectarAtestado(text) {
  const p = [/atestado.{0,20}(\d{1,2}[\/\-]\d{1,2})/i, /segue.{0,10}atestado.{0,20}(\d{1,2}[\/\-]\d{1,2})/i, /(\d{1,2}[\/\-]\d{1,2}).{0,10}atestado/i];
  for (const r of p) {
    const m = text.match(r);
    if (m) {
      const data = m[1].replace('-','/');
      const pts = data.split('/');
      const semanas = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
      const d = new Date(2025, parseInt(pts[1])-1, parseInt(pts[0]));
      atestadoData = { dia: data, diaSemana: semanas[d.getDay()] };
      return true;
    }
  }
  return false;
}

const respostas = {
  'Banco de horas detalhado': { text: 'Aqui está o detalhamento de junho. Note a saída inconsistente do dia 11/06.', ctx: 'banco' },
  'Ajustar ponto da quarta': { text: 'Abrindo o formulário de ajuste para quarta-feira.', ctx: 'ajuste' },
};

function addBotMsg(text) {
  const msgs = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${nowTime()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMsg(text) {
  const msgs = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${nowTime()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function process(text) {
  addUserMsg(text);
  addTyping();
  setTimeout(() => {
    const t = document.getElementById('typing');
    if (t) t.remove();
    if (detectarAtestado(text)) {
      addBotMsg(`Falta de <strong>${atestadoData.diaSemana}, ${atestadoData.dia}</strong>. Anexe o atestado.`);
      renderCtx('atestado');
      return;
    }
    if (/ajust|inconsistent|quart|corrig|regulariz/i.test(text)) {
      addBotMsg('Abrindo o ajuste da quarta-feira.');
      renderCtx('ajuste');
      return;
    }
    const resp = respostas[text];
    if (resp) { addBotMsg(resp.text); renderCtx(resp.ctx); }
    else { addBotMsg('Verificando nos sistemas...'); }
  }, 700);
}

function qs(text) { process(text); }

function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  process(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function resizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function tick() {
  const t = new Date();
  document.getElementById('statusTime').textContent = t.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('dataLabel').textContent = `${dias[t.getDay()]}, ${t.getDate()} ${meses[t.getMonth()]}`;
  const rel = document.getElementById('relogio');
  if (rel) rel.textContent = t.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

renderCtx('default');
setInterval(tick, 1000);
tick();
</script>
